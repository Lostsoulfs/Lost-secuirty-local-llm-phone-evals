name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Unit and proof tests
        run: python -m pytest
      - name: CLI proof baseline
        run: phone-evals proof
      - name: Report generation check
        run: python tools/generate_report.py --check
      - name: Whitespace check
        run: python tools/check_whitespace.py
      - name: Redaction scanner self-test
        run: python tools/scan_staged.py --self-test
      - name: Repository sensitive-data scan
        run: python tools/scan_staged.py --all
